services:
  cfa-vocab-bot:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python -m cfa_vocab_bot bot
    restart: unless-stopped

  cfa-vocab-api:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python -m cfa_vocab_bot api --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    profiles:
      - api
    restart: unless-stopped

